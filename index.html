<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIRGPrice · GitHub Portfolio</title>
    <meta name="description" content="Personal portfolio of Antón Fernández Pérez (SIRGPrice) — projects, code and contributions on GitHub." />
    <meta name="author" content="Antón Fernández Pérez" />
    <meta property="og:title" content="SIRGPrice · GitHub Portfolio" />
    <meta property="og:description" content="Projects, code and contributions on GitHub." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sirgprice.github.io/" />
    <link rel="icon" type="image/png" href="https://github.com/SIRGPrice.png" />
    <link rel="preconnect" href="https://api.github.com" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="aurora" aria-hidden="true">
        <span class="blob blob-1"></span>
        <span class="blob blob-2"></span>
        <span class="blob blob-3"></span>
    </div>

    <main class="container">
        <header class="hero glass">
            <div class="hero-inner">
                <img id="avatar" class="avatar" alt="SIRGPrice avatar" src="https://github.com/SIRGPrice.png" />
                <div class="hero-text">
                    <p class="kicker"><span class="dot"></span> Available for hire</p>
                    <h1 id="name">SIRGPrice</h1>
                    <p id="bio" class="bio">Loading profile…</p>
                    <ul class="meta">
                        <li id="meta-location" hidden><span class="icon">◎</span> <span></span></li>
                        <li id="meta-blog" hidden><span class="icon">↗</span> <a href="#" target="_blank" rel="noopener"></a></li>
                        <li id="meta-company" hidden><span class="icon">⌘</span> <span></span></li>
                    </ul>
                </div>
            </div>
        </header>

        <section class="stats" aria-label="GitHub stats">
            <a class="stat glass" href="https://github.com/SIRGPrice?tab=repositories" target="_blank" rel="noopener">
                <span class="stat-value" id="stat-repos">–</span>
                <span class="stat-label">Repositories</span>
            </a>
            <a class="stat glass" href="https://github.com/SIRGPrice?tab=followers" target="_blank" rel="noopener">
                <span class="stat-value" id="stat-followers">–</span>
                <span class="stat-label">Followers</span>
            </a>
            <a class="stat glass" href="https://github.com/SIRGPrice?tab=following" target="_blank" rel="noopener">
                <span class="stat-value" id="stat-following">–</span>
                <span class="stat-label">Following</span>
            </a>
            <a class="stat glass" href="https://github.com/SIRGPrice?tab=stars" target="_blank" rel="noopener">
                <span class="stat-value" id="stat-stars">–</span>
                <span class="stat-label">Stars earned</span>
            </a>
        </section>

        <section class="contrib glass" aria-label="Contribution graph">
            <div class="contrib-head">
                <h2>Contributions</h2>
                <a href="https://github.com/SIRGPrice" target="_blank" rel="noopener" class="ghost">View profile →</a>
            </div>
            <a href="https://github.com/SIRGPrice" target="_blank" rel="noopener" class="contrib-link">
                <img id="contrib-img"
                     alt="GitHub contributions graph for SIRGPrice"
                     src="https://ghchart.rshah.org/SIRGPrice" />
            </a>
        </section>

        <section class="projects" aria-label="Projects">
            <div class="projects-head">
                <h2>Projects</h2>
                <a href="https://github.com/SIRGPrice?tab=repositories" target="_blank" rel="noopener" class="ghost">All repositories →</a>
            </div>
            <div id="projects-grid" class="grid" aria-live="polite">
                <div class="card glass skeleton"></div>
                <div class="card glass skeleton"></div>
                <div class="card glass skeleton"></div>
                <div class="card glass skeleton"></div>
                <div class="card glass skeleton"></div>
                <div class="card glass skeleton"></div>
            </div>
        </section>

        <footer class="footer glass-soft">
            <p>
                Built with care and deployed via
                <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a>.
                Source on
                <a href="https://github.com/SIRGPrice/SIRGPrice.github.io" target="_blank" rel="noopener">github.com/SIRGPrice/SIRGPrice.github.io</a>.
            </p>
        </footer>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
